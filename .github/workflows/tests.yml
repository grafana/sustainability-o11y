name: Tests

on:
  push:
    branches: ["main"]
    paths:
      - "azure-carbon-exporter/**"
  pull_request:
    branches: ["main"]
    paths:
      - "azure-carbon-exporter/**"

jobs:
  build-lint-test:
    permissions:
      pull-requests: read
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: azure-carbon-exporter
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup-goversion
      - name: Build
        run: go build -v ./...
      - name: Lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20 # v9.2.0
        with:
          version: v2.10.1
          working-directory: azure-carbon-exporter
      - name: Test
        run: go test -v ./...
