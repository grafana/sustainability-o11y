name: setup-goversion
description: Extracts the Go version from azure-carbon-exporter/Dockerfile and sets up Go
runs:
  using: composite
  steps:
    - id: goversion
      run: |
        cat azure-carbon-exporter/Dockerfile | awk 'BEGIN{IGNORECASE=1} /^FROM golang:.* AS builder$/ {v=$2;split(v,a,":|-|@")}; END {printf("version=%s", a[2])}' >> $GITHUB_OUTPUT
      shell: bash
    - uses: actions/setup-go@7a3fe6cf4cb3a834922a1244abfce67bcef6a0c5 # v6.2.0
      with:
        go-version: "${{steps.goversion.outputs.version}}"
